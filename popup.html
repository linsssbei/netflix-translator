<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Translator</title>
  <link rel="stylesheet" href="./src/popup/popup.css">
</head>
<body>
  <div id="app">
    <h1>Netflix Translator</h1>
    <p>Status: <span id="status">Loading...</span></p>
    <div id="controls" class="hidden">
      <label for="target-language">Target Language:</label>
      <select id="target-language">
        <option value="zh-CN">Chinese (简体中文)</option>
        <option value="zh-TW">Chinese (繁體中文)</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="en">English</option>
      </select>
      <button id="prepare-btn">Prepare Subtitles</button>
      <button id="toggle-btn" class="hidden">Enable Translation</button>
    </div>
    <!-- Diagnostics Panel -->
    <div id="diagnostics" class="hidden">
      <div class="diagnostics-header">
        <span id="diag-status">Preparing...</span>
        <span id="diag-percent">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>
      <div class="diagnostics-details">
        <div id="diag-batch" class="hidden">Batch <span id="diag-current-batch">0</span> / <span id="diag-total-batches">0</span></div>
        <div id="diag-segments" class="hidden"><span id="diag-validated-count">0</span> / <span id="diag-total-segments">0</span> segments</div>
        <div id="diag-model" class="hidden">Model: <span id="diag-model-name">-</span></div>
        <div id="diag-tokens" class="hidden">Tokens: <span id="diag-token-usage">-</span></div>
      </div>
      <div id="diag-error" class="hidden error-box"></div>
      <button id="retry-btn" class="hidden secondary">Retry Translation</button>
    </div>

    <!-- Segment Preview -->
    <div id="segment-preview" class="hidden">
      <div class="preview-header">
        <span id="preview-count">0 segments</span>
        <button id="preview-toggle" class="text-btn">Show Preview</button>
      </div>
      <div id="preview-content" class="hidden">
        <div id="preview-list" class="preview-list"></div>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="library-link">📚 Subtitle Library</a>
    </div>
  </div>
  <script type="module" src="./src/popup/popup.ts"></script>
</body>
</html>
