<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Translator Options</title>
  <link rel="stylesheet" href="./src/options/options.css">
</head>
<body>
  <div id="app">
    <h1>Netflix Translator Settings</h1>
    
    <section>
      <h2>Translation Provider</h2>
      <div class="form-group">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="custom">Custom Endpoint</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="Enter your API key">
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input type="text" id="model" placeholder="deepseek-chat">
      </div>
      
      <div class="form-group">
        <label for="custom-endpoint">Endpoint URL</label>
        <input type="text" id="custom-endpoint" placeholder="https://api.deepseek.com/v1/chat/completions">
      </div>
    </section>
    
    <section>
      <h2>Default Settings</h2>
      <div class="form-group">
        <label for="default-language">Default Target Language</label>
        <select id="default-language">
          <option value="zh-CN">Chinese - Simplified (简体中文)</option>
          <option value="zh-TW">Chinese - Traditional (繁體中文)</option>
          <option value="ja">Japanese (日本語)</option>
          <option value="ko">Korean (한국어)</option>
          <option value="en">English</option>
        </select>
      </div>
    </section>
    
    <button id="save-btn">Save Settings</button>
    <p id="save-status"></p>
  </div>
  <script type="module" src="./src/options/options.ts"></script>
</body>
</html>
